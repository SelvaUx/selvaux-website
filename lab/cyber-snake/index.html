<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Snake - Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;}
        canvas { background-color: #161b22; border: 2px solid #58a6ff; border-radius: 8px; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }
        .btn { background-color: #58a6ff; color: #0d1117; font-weight: 700; padding: 12px 24px; border-radius: 8px; transition: all 0.3s ease; border: 2px solid transparent;}
        .btn:hover { background-color: transparent; border-color: #58a6ff; color: #58a6ff; box-shadow: 0 0 10px rgba(88, 166, 255, 0.6); }
    </style>
</head>
<body>
    <div class="w-full max-w-lg flex justify-between items-center mb-8">
        <a href="../../lab/" class="text-[#58a6ff] hover:text-blue-400 font-semibold border border-[#30363d] bg-[#161b22] px-4 py-2 rounded-lg transition hover:border-[#58a6ff]">&larr; Lab</a>
        <h1 class="text-2xl font-bold tracking-widest text-[#58a6ff]" style="text-shadow: 0 0 10px rgba(88,166,255,0.8);">CYBER SNAKE</h1>
        <div class="text-lg font-bold bg-[#161b22] px-4 py-2 rounded-lg border border-[#30363d]">SCORE: <span id="score" class="text-[#58a6ff]">0</span></div>
    </div>
    
    <div class="relative">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver" class="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-80 rounded-lg hidden backdrop-blur-sm">
            <h2 class="text-3xl font-bold text-red-500 mb-6" style="text-shadow: 0 0 15px red;">SYSTEM FAILURE</h2>
            <button onclick="resetGame()" class="btn">REBOOT SEQUENCE</button>
        </div>
    </div>

    <p class="text-gray-500 mt-6 text-sm max-w-md text-center">Use Arrow Keys to navigate the mainframe. Collect data packets to expand. Avoid system boundaries and yourself.</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElem = document.getElementById("score");
        const gameOverScreen = document.getElementById("gameOver");
        
        const grid = 20;
        let count = 0;
        let score = 0;
        let animationId;
        
        let snake = {
            x: 160,
            y: 160,
            dx: grid,
            dy: 0,
            cells: [],
            maxCells: 4
        };
        
        let apple = { x: 320,  y: 320 };
        
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function resetGame() {
            snake.x = 160;
            snake.y = 160;
            snake.cells = [];
            snake.maxCells = 4;
            snake.dx = grid;
            snake.dy = 0;
            score = 0;
            scoreElem.textContent = score;
            apple.x = getRandomInt(0, 20) * grid;
            apple.y = getRandomInt(0, 20) * grid;
            gameOverScreen.classList.add('hidden');
            animationId = requestAnimationFrame(loop);
        }

        function loop() {
            animationId = requestAnimationFrame(loop);
            if (++count < 6) return; 
            count = 0;
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            snake.x += snake.dx;
            snake.y += snake.dy;
            
            if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
                cancelAnimationFrame(animationId);
                gameOverScreen.classList.remove('hidden');
                return;
            }
            
            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();
            
            ctx.fillStyle = '#ff5555';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff5555';
            ctx.fillRect(apple.x, apple.y, grid-1, grid-1);
            
            ctx.fillStyle = '#58a6ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#58a6ff';
            
            for (let i=0; i<snake.cells.length; i++) {
                let cell = snake.cells[i];
                ctx.fillRect(cell.x, cell.y, grid-1, grid-1);
                
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score += 10;
                    scoreElem.textContent = score;
                    apple.x = getRandomInt(0, 20) * grid;
                    apple.y = getRandomInt(0, 20) * grid;
                }
                
                for (let j=i+1; j<snake.cells.length; j++) {
                    if (cell.x === snake.cells[j].x && cell.y === snake.cells[j].y) {
                        cancelAnimationFrame(animationId);
                        gameOverScreen.classList.remove('hidden');
                    }
                }
            }
            ctx.shadowBlur = 0;
        }

        document.addEventListener('keydown', function(e) {
            // Prevent default scrolling for arrows
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
            if (e.key === 'ArrowLeft' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if (e.key === 'ArrowUp' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
            else if (e.key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if (e.key === 'ArrowDown' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
        });

        animationId = requestAnimationFrame(loop);
    </script>
</body>
</html>
